{{ define "main" }}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">{{ .Title }}</h1>
  <p class="text-lg text-gray-600 mb-8">{{ .Title }} 分类下的所有商品</p>
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    {{ range where .Pages "Section" "product" }}
      {{ partial "product-card" (dict "product" .) }}
    {{ end }}
  </div>
</div>
{{ end }}
