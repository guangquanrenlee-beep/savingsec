{{ define "main" }}
<div class="max-w-content mx-auto px-6 py-12">
  <h1 class="text-2xl font-semibold text-brand mb-2">{{ .Title }}</h1>
  <p class="text-sm text-neutral-muted mb-8">{{ i18n "category_products_desc" }}</p>
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    {{ range where .Pages "Section" "product" }}
      {{ partial "product-card" (dict "product" .) }}
    {{ end }}
  </div>
</div>
{{ end }}
