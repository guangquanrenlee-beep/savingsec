{{ define "main" }}
<div class="max-w-content mx-auto px-6 py-12">
  <h1 class="text-2xl font-semibold text-brand mb-2">{{ i18n "coupons_title" }}</h1>
  <p class="text-sm text-neutral-muted mb-8">{{ i18n "coupons_subtitle" }}</p>
  <div class="grid gap-5">
    {{ range .Pages }}
      {{ partial "coupon-card" (dict "coupon" .) }}
    {{ end }}
  </div>
</div>
{{ end }}
