{{ define "main" }}
<div class="max-w-content mx-auto px-6 py-12">
  <h1 class="text-2xl font-semibold text-brand mb-2">{{ i18n "deals_title" }}</h1>
  <p class="text-sm text-neutral-muted mb-8">{{ i18n "deals_subtitle" }}</p>
  <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
      {{ partial "deal-card" (dict "deal" .) }}
    {{ end }}
  </div>
</div>
{{ end }}
