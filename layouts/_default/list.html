{{ define "main" }}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">{{ .Title }}</h1>
  {{ with .Params.description }}<p class="text-lg text-gray-600 mb-8">{{ . }}</p>{{ end }}
  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
      {{ .Render "summary" }}
    {{ end }}
  </div>
</div>
{{ end }}
