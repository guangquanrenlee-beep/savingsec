<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "zh-CN" }}" class="scroll-smooth">
<head>
  {{ partial "head.html" . }}
</head>
<body class="flex flex-col min-h-screen bg-neutral-light">
  {{ partial "header.html" . }}
  <main class="flex-grow">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <!-- Copy Code JS -->
  <script>
    function copyCode(code, boxId) {
      navigator.clipboard.writeText(code).then(() => {
        const box = document.getElementById(boxId);
        const btn = box.querySelector('button');
        const text = btn.querySelector('.copy-text');
        text.textContent = '{{ i18n "copied" }}';
        btn.classList.remove('bg-brand','hover:bg-brand-light');
        btn.classList.add('bg-accent');
        setTimeout(() => {
          text.textContent = '{{ i18n "copy_code" }}';
          btn.classList.remove('bg-accent');
          btn.classList.add('bg-brand','hover:bg-brand-light');
        }, 2000);
      });
    }
  </script>
  <!-- Keyboard shortcut: press / to go to search -->
  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        window.location.href = '/search/';
      }
    });
  </script>
</body>
</html>
