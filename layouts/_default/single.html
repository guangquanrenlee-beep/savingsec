{{ define "main" }}
<article class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-semibold text-brand mb-4">{{ .Title }}</h1>
  {{ with .Params.description }}<p class="text-base text-neutral-text leading-relaxed mb-6">{{ . }}</p>{{ end }}
  <div class="prose">{{ .Content }}</div>
</article>
{{ end }}
