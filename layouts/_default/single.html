{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-4">{{ .Title }}</h1>
  {{ with .Params.description }}<p class="text-lg text-gray-600 mb-6">{{ . }}</p>{{ end }}
  <div class="prose prose-lg max-w-none">{{ .Content }}</div>
</article>
{{ end }}
