{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <nav class="flex items-center text-sm text-gray-500 mb-6">
    <a href="/" class="hover:text-primary-600">首页</a><span class="mx-2">/</span>
    <a href="/blog/" class="hover:text-primary-600">文章</a><span class="mx-2">/</span>
    <span class="text-gray-900">{{ .Title }}</span>
  </nav>
  <header class="mb-8">
    <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-4">{{ .Title }}</h1>
    {{ with .Params.description }}<p class="text-lg text-gray-600 mb-4">{{ . }}</p>{{ end }}
    <div class="flex items-center gap-4 text-sm text-gray-500">
      <span>{{ .Params.author }}</span>
      <span>最后更新: {{ .Params.last_updated | time.Format "2006年1月2日" }}</span>
    </div>
  </header>
  <div class="bg-white rounded-xl shadow-card p-6 sm:p-8 prose prose-lg max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
