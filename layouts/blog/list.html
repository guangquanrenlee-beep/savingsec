{{ define "main" }}
<div class="max-w-content mx-auto px-6 py-12">
  <h1 class="text-2xl font-semibold text-brand mb-2">{{ i18n "articles_title" }}</h1>
  <p class="text-sm text-neutral-muted mb-8">{{ i18n "articles_subtitle" }}</p>
  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
      <article class="card">
        <div class="p-6">
          <h3 class="text-[15px] font-semibold text-brand mb-2"><a href="{{ .RelPermalink }}" class="hover:text-accent transition-colors">{{ .Title }}</a></h3>
          {{ with .Params.description }}<p class="text-sm text-neutral-text leading-relaxed line-clamp-2 mb-3">{{ . }}</p>{{ end }}
          <div class="flex items-center justify-between text-[13px] text-neutral-muted">
            <span>{{ .Params.author }}</span>
            <span>{{ .Params.last_updated | time.Format (i18n "date_format") }}</span>
          </div>
        </div>
      </article>
    {{ end }}
  </div>
</div>
{{ end }}
