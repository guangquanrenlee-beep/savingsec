{{ define "main" }}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">文章</h1>
  <p class="text-lg text-gray-600 mb-8">购买指南与实用建议</p>
  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
      <article class="card bg-white rounded-xl shadow-card hover:shadow-card-hover transition-all overflow-hidden">
        <div class="p-5">
          <h3 class="text-lg font-semibold text-gray-900 mb-2"><a href="{{ .RelPermalink }}" class="hover:text-primary-600">{{ .Title }}</a></h3>
          {{ with .Params.description }}<p class="text-sm text-gray-600 line-clamp-2 mb-3">{{ . }}</p>{{ end }}
          <div class="flex items-center justify-between text-sm text-gray-500">
            <span>{{ .Params.author }}</span>
            <span>{{ .Params.last_updated | time.Format "2006-01-02" }}</span>
          </div>
        </div>
      </article>
    {{ end }}
  </div>
</div>
{{ end }}
