<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-200">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center space-x-2">
        <span class="text-2xl">🎯</span>
        <span class="text-xl font-bold text-gray-900">{{ .Site.Params.siteName }}</span>
      </a>
      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center space-x-6">
        <a href="/product/" class="text-sm font-medium text-gray-700 hover:text-primary-600">商品</a>
