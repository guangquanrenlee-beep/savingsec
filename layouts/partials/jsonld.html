<!-- Organization Schema -->
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Params.siteName }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "{{ .Site.Params.logo | absURL }}",
  "description": "{{ .Site.Params.description }}",
  "sameAs": [{{ with .Site.Params.social.twitter }}"https://twitter.com/{{ strings.TrimPrefix "@" . }}"{{ end }}]
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Params.siteName }}",
  "url": "{{ .Site.BaseURL }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ .Site.BaseURL }}?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}

<!-- Product Schema -->
{{ if eq .Section "product" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ .Title }}",
  "description": "{{ .Params.description | truncate 200 }}",
  {{ with .Params.brand }}"brand": { "@type": "Brand", "name": "{{ . }}" },{{ end }}
  {{ with .Params.rating }}"aggregateRating": { "@type": "AggregateRating", "ratingValue": "{{ . }}", "bestRating": "5" },{{ end }}
  "offers": {
    "@type": "Offer",
    "url": "{{ .Params.affiliate_link | default .Permalink }}",
    {{ with .Params.price }}"price": "{{ . }}",{{ end }}
    {{ with .Params.original_price }}"listPrice": "{{ . }}",{{ end }}
    "priceCurrency": "CNY",
    "availability": "https://schema.org/InStock"
  }
}
</script>
{{ end }}

<!-- FAQ Schema -->
{{ if and .IsPage .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $faq := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ $faq.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $faq.answer | jsonify }}
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}

<!-- Article Schema (for review/blog) -->
{{ if or (eq .Section "review") (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description | truncate 200 }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Params.last_updated | default .Lastmod | time.Format "2006-01-02" }}",
  "author": { "@type": "Organization", "name": "{{ .Params.author | default .Site.Params.author }}" },
  "publisher": { "@type": "Organization", "name": "{{ .Site.Params.siteName }}" },
  "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ .Permalink }}" }
}
</script>
{{ end }}

<!-- Breadcrumb Schema -->
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "首页", "item": "{{ .Site.BaseURL }}" },
    {{ if .Section }}
    { "@type": "ListItem", "position": 2, "name": "{{ .Section | title }}", "item": "{{ .Site.BaseURL }}{{ .Section }}/" }{{ if .IsPage }},{{ end }}
    {{ end }}
    {{ if .IsPage }}
    { "@type": "ListItem", "position": 3, "name": "{{ .Title }}", "item": "{{ .Permalink }}" }
    {{ end }}
  ]
}
</script>
{{ end }}
