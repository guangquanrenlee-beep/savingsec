baseURL: "https://savingsec.com/"
title: "SavingSec"
languageCode: "en-US"
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    languageCode: "en-US"
    weight: 1
    params:
      siteName: "SavingSec"
  fr:
    languageName: "Français"
    languageCode: "fr-FR"
    weight: 2
    params:
      siteName: "SavingSec"
  de:
    languageName: "Deutsch"
    languageCode: "de-DE"
    weight: 3
    params:
      siteName: "SavingSec"
  ja:
    languageName: "日本語"
    languageCode: "ja-JP"
    weight: 4
    params:
      siteName: "SavingSec"
  pt:
    languageName: "Português"
    languageCode: "pt-BR"
    weight: 5
    params:
      siteName: "SavingSec"
  es:
    languageName: "Español"
    languageCode: "es-ES"
    weight: 6
    params:
      siteName: "SavingSec"

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
pagination:
  pagerSize: 20

summaryLength: 160

permalinks:
  product: "/product/:slug/"
  coupon: "/coupon/:slug/"
  deal: "/deal/:slug/"
  review: "/review/:slug/"
  blog: "/blog/:slug/"
  brand: "/brand/:slug/"
  category: "/category/:slug/"

taxonomies:
  brand: "brand"
  category: "category"
  tag: "tag"

outputs:
  home: [HTML, RSS, JSON]
  section: [HTML, RSS]
  taxonomy: [HTML, RSS]
  term: [HTML, RSS]

outputFormats:
  JSON:
    mediaType: "application/json"
    baseName: "search"
    isPlainText: true
    notAlternative: true

params:
  description: "Professional product reviews, coupon codes & deal aggregation platform"
  author: "SavingSec Team"
  email: "Assnent@gmail.com"
  twitter: "@productpick"
  logo: "/images/logo.svg"
  ogImage: "/images/og-default.jpg"

  affiliate:
    disclaimer: "We may earn a commission through links, which does not affect your purchase price."
    nofollowLinks: true

  search:
    enabled: true
    type: "pagefind"

  seo:
    generateJSONLD: true
    generateSitemap: true

  social:
    twitter: "@productpick"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      tableOfContents:
        startLevel: 2
        endLevel: 4

module:
  hugoVersion:
    extended: false
    min: "0.120.0"
